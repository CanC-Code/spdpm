name: Build Pokemon-Emerald-SPD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # We check out the SPD source directly into the current directory
          repository: '00-Evan/shattered-pixel-dungeon'
          fetch-depth: 0

      - name: Checkout Mod Scripts
        uses: actions/checkout@v4
        with:
          # This pulls YOUR scripts (like runtime.py) into a subfolder
          path: mod-files

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python Dependencies
        run: pip install Pillow requests

      - name: Execute Emerald Runtime Script
* run: python mod-files/scripts/runtime.py

      - name: Build Android APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Pokemon-Emerald-Dungeon
        uses: actions/upload-artifact@v4
        with:
          name: Pokemon-Emerald-Final
          path: android/build/outputs/apk/debug/android-debug.apk
