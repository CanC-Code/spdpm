name: Dynamic Pokemon-SPD Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  convert-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Base SPD
        uses: actions/checkout@v4
        with:
          repository: '00-Evan/shattered-pixel-dungeon'

      - name: Create Scripts Directory
        run: mkdir -p scripts

      - name: Checkout Personal Customizations
        # This step pulls your scripts/runtime.py from your own repo 
        # while staying inside the SPD directory context
        uses: actions/checkout@v4
        with:
          path: 'mod_files'

      - name: Prepare Runtime Script
        run: |
          cp mod_files/scripts/runtime.py scripts/runtime.py
          rm -rf mod_files

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python Dependencies
        run: pip install Pillow requests

      - name: Execute Emerald Conversion
        run: python scripts/runtime.py

      - name: Build Android APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Pokemon-Emerald-Dungeon-Dynamic
          path: android/build/outputs/apk/debug/android-debug.apk
